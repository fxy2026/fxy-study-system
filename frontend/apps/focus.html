<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>专注计时</title>
<link rel="manifest" href="focus-manifest.json">
<style>
:root{--bg:#0a0a14;--card:#1a1a2e;--text:#e0e0e0;--text2:#888;--border:#2a2a3e;--accent:#4361ee;--accent2:#7c8cf8;--success:#2a9d8f;--warn:#f59e0b;--danger:#e53e3e;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.header h1{font-size:16px;background:linear-gradient(135deg,#e53e3e,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hright{margin-left:auto}.btn{background:var(--bg);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;text-decoration:none}
.main{max-width:500px;margin:0 auto;padding:20px 16px 100px;width:100%;display:flex;flex-direction:column;align-items:center}

.subject-bar{width:100%;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
.subj-btn{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:13px;cursor:pointer;transition:all .2s}
.subj-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.presets{display:flex;gap:8px;margin-bottom:24px}
.preset{padding:6px 16px;border-radius:16px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:13px;cursor:pointer}
.preset.active{background:rgba(67,97,238,.15);border-color:var(--accent);color:var(--accent)}

.timer-wrap{position:relative;width:260px;height:260px;margin:10px 0 20px}
.timer-ring{width:100%;height:100%;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border);stroke-width:8}
.ring-fg{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.ring-fg.warn{stroke:var(--warn)}.ring-fg.danger{stroke:var(--danger)}.ring-fg.success{stroke:var(--success)}
.timer-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.timer-time{font-size:52px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:2px}
.timer-label{font-size:13px;color:var(--text2);margin-top:4px}

.start-btn{width:200px;padding:16px;border-radius:30px;border:none;font-size:17px;font-weight:700;cursor:pointer;transition:all .2s;margin-bottom:16px}
.start-btn.go{background:linear-gradient(135deg,var(--accent),var(--success));color:#fff}
.start-btn.go:hover{opacity:.9}
.start-btn.cancel{background:var(--card);color:var(--danger);border:2px solid var(--danger)}
.start-btn:disabled{opacity:.4;cursor:not-allowed}

.tip{text-align:center;color:var(--text2);font-size:13px;margin-bottom:24px;line-height:1.6;max-width:300px}
.tip strong{color:var(--accent2)}

.stats{width:100%;background:var(--card);border-radius:var(--radius);padding:16px;border:1px solid var(--border)}
.stats h3{font-size:14px;color:var(--text2);margin-bottom:12px}
.stat-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.stat-label{width:70px;font-size:13px;color:var(--text2);text-align:right}
.stat-bar-bg{flex:1;height:20px;background:var(--bg);border-radius:4px;overflow:hidden}
.stat-bar{height:100%;border-radius:4px;min-width:0;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:11px;color:rgba(255,255,255,.8)}
.stat-total{text-align:center;margin-top:12px;font-size:15px;color:var(--accent2)}
.no-stats{color:var(--text2);font-size:13px;text-align:center;padding:16px 0}

.focus-hint{background:linear-gradient(135deg,rgba(67,97,238,.1),rgba(42,157,143,.1));border:1px solid rgba(67,97,238,.2);border-radius:var(--radius);padding:14px;margin-bottom:20px;width:100%}
.focus-hint h4{font-size:14px;color:var(--accent2);margin-bottom:8px}
.focus-hint p{font-size:12px;color:var(--text2);line-height:1.6}
</style>
</head>
<body>
<div class="header">
  <h1>🍅 专注计时</h1>
  <div class="hright"><a href="index.html" class="btn">← 返回</a></div>
</div>

<div class="main">
  <div class="subject-bar" id="subjects"></div>
  <div class="presets" id="presets"></div>

  <div class="timer-wrap">
    <svg class="timer-ring" viewBox="0 0 120 120">
      <circle class="ring-bg" cx="60" cy="60" r="54"/>
      <circle class="ring-fg" id="ring" cx="60" cy="60" r="54"/>
    </svg>
    <div class="timer-text">
      <div class="timer-time" id="time">25:00</div>
      <div class="timer-label" id="label">选择科目开始</div>
    </div>
  </div>

  <button class="start-btn go" id="startBtn" disabled>选择科目</button>

  <div class="tip" id="tip">选一个科目，设定时长，然后<strong>放下手机专注学习</strong>。<br>计时结束会通过 Bark 推送通知你。</div>

  <div class="focus-hint">
    <h4>💡 搭配 iOS 专注模式效果更好</h4>
    <p>设置 → 专注 → 学习 → 自定义允许的 App 和通知<br>
    只放行 Bark 通知，屏蔽微信/抖音等干扰<br>
    开始计时时手动开启，结束后自动关闭</p>
  </div>

  <div class="stats" id="stats">
    <h3>📊 今日专注</h3>
    <div id="statsBody"><div class="no-stats">今天还没有专注记录</div></div>
  </div>
</div>

<script>
const SUBJECTS=[
  {id:'高数II',name:'高数II',color:'#4361ee'},
  {id:'有机化学',name:'有机化学',color:'#2a9d8f'},
  {id:'概率统计',name:'概率统计',color:'#7c3aed'},
  {id:'大学物理',name:'大物',color:'#f59e0b'},
  {id:'分析化学',name:'分析化学',color:'#ec4899'},
  {id:'习思想',name:'习思想',color:'#06b6d4'},
  {id:'普通生物学',name:'普生',color:'#84cc16'},
  {id:'AI基础',name:'AI基础',color:'#f97316'},
];
const DURATIONS=[25,45,60];
const API='/api/focus-log';
const CIRC=2*Math.PI*54;
const STATE_KEY='focus_state';

let selected=null, duration=25, state='idle'; // idle | running | done
let endTime=null, checkTimer=null;

// Init UI
const bar=document.getElementById('subjects');
SUBJECTS.forEach(s=>{
  const b=document.createElement('div');
  b.className='subj-btn';b.textContent=s.name;
  b.onclick=()=>{if(state==='running')return;selected=s;
    document.querySelectorAll('.subj-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('ring').style.stroke=s.color;
    document.getElementById('label').textContent=s.name;
    document.getElementById('startBtn').disabled=false;
    document.getElementById('startBtn').textContent='开始专注';
  };
  bar.appendChild(b);
});
const preDiv=document.getElementById('presets');
DURATIONS.forEach((m,i)=>{
  const p=document.createElement('div');
  p.className='preset'+(i===0?' active':'');p.textContent=m+'min';p.dataset.min=m;
  p.onclick=()=>{if(state==='running')return;duration=m;
    document.querySelectorAll('.preset').forEach(x=>x.classList.remove('active'));p.classList.add('active');
    render();};
  preDiv.appendChild(p);
});

const ring=document.getElementById('ring');
ring.style.strokeDasharray=CIRC;

function render(){
  const now=Date.now();
  let remaining,total=duration*60;
  if(state==='running'&&endTime){
    remaining=Math.max(0,Math.ceil((endTime-now)/1000));
    if(remaining<=0){complete();return;}
  } else {
    remaining=total;
  }
  const min=Math.floor(remaining/60),sec=remaining%60;
  document.getElementById('time').textContent=`${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  const pct=remaining/total;
  ring.style.strokeDashoffset=CIRC*(1-pct);
  ring.classList.remove('warn','danger','success');
  if(state==='done')ring.classList.add('success');
  else if(pct<0.1)ring.classList.add('danger');
  else if(pct<0.3)ring.classList.add('warn');
}

function startFocus(){
  if(!selected)return;
  state='running';
  endTime=Date.now()+duration*60*1000;
  // Save state to localStorage (survives page close)
  localStorage.setItem(STATE_KEY,JSON.stringify({subject:selected.id,duration,endTime,color:selected.color}));
  // Tell server to schedule Bark push
  fetch('/api/focus-timer',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({subject:selected.id,duration})}).catch(()=>{});

  document.getElementById('startBtn').textContent='放弃';
  document.getElementById('startBtn').className='start-btn cancel';
  document.getElementById('label').textContent='专注中... 可以锁屏了';
  document.getElementById('tip').innerHTML='<strong>📱 放下手机，专心学习</strong><br>Bark 会在计时结束时推送通知你';
  document.querySelectorAll('.subj-btn,.preset').forEach(b=>b.style.pointerEvents='none');
  startCheck();
}

function cancelFocus(){
  state='idle';endTime=null;
  localStorage.removeItem(STATE_KEY);
  clearInterval(checkTimer);
  document.getElementById('startBtn').textContent='开始专注';
  document.getElementById('startBtn').className='start-btn go';
  document.getElementById('label').textContent=selected?selected.name:'选择科目开始';
  document.getElementById('tip').innerHTML='选一个科目，设定时长，然后<strong>放下手机专注学习</strong>。';
  document.querySelectorAll('.subj-btn,.preset').forEach(b=>b.style.pointerEvents='');
  render();
}

function complete(){
  state='done';
  clearInterval(checkTimer);
  localStorage.removeItem(STATE_KEY);
  const elapsed=duration;
  // Sound
  try{const c=new AudioContext();[523,659,784].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=.3;o.start(c.currentTime+i*.2);o.stop(c.currentTime+i*.2+.2);});}catch(e){}
  if(navigator.vibrate)navigator.vibrate([200,100,200,100,200]);

  document.getElementById('time').textContent='🎉';
  document.getElementById('label').textContent=`${elapsed}分钟专注完成！`;
  ring.style.strokeDashoffset=0;
  ring.classList.add('success');
  document.getElementById('startBtn').textContent='再来一轮';
  document.getElementById('startBtn').className='start-btn go';
  document.getElementById('tip').innerHTML=`<strong>✅ ${selected.id} ${elapsed}分钟 完成！</strong><br>休息一下再来`;
  document.querySelectorAll('.subj-btn,.preset').forEach(b=>b.style.pointerEvents='');

  // Log to server
  fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({subject:selected.id,duration:elapsed,timestamp:new Date().toISOString()})
  }).then(()=>loadStats()).catch(()=>{});
}

function startCheck(){
  render();
  checkTimer=setInterval(render,1000);
}

document.getElementById('startBtn').onclick=()=>{
  if(state==='running'){cancelFocus();}
  else{startFocus();}
};

// Restore state on page load (handles: user locked screen, then came back)
function restoreState(){
  const saved=localStorage.getItem(STATE_KEY);
  if(!saved)return;
  try{
    const s=JSON.parse(saved);
    const now=Date.now();
    // Find the subject
    const subj=SUBJECTS.find(x=>x.id===s.subject);
    if(!subj)return;
    selected=subj;
    duration=s.duration;
    document.querySelectorAll('.subj-btn').forEach((b,i)=>{b.classList.toggle('active',SUBJECTS[i].id===s.subject);});
    document.querySelectorAll('.preset').forEach(p=>{p.classList.toggle('active',parseInt(p.dataset.min)===s.duration);});
    ring.style.stroke=s.color;

    if(now>=s.endTime){
      // Timer already completed while we were away
      endTime=s.endTime;
      complete();
    } else {
      // Still running
      state='running';endTime=s.endTime;
      document.getElementById('startBtn').textContent='放弃';
      document.getElementById('startBtn').className='start-btn cancel';
      document.getElementById('startBtn').disabled=false;
      document.getElementById('label').textContent='专注中... 可以锁屏了';
      document.getElementById('tip').innerHTML='<strong>📱 放下手机，专心学习</strong><br>Bark 会在计时结束时推送通知你';
      document.querySelectorAll('.subj-btn,.preset').forEach(b=>b.style.pointerEvents='none');
      startCheck();
    }
  }catch(e){localStorage.removeItem(STATE_KEY);}
}

// Stats
async function loadStats(){
  try{
    const res=await fetch(API+'?range=today');
    const data=await res.json();
    const entries=data.entries||[];
    if(!entries.length){document.getElementById('statsBody').innerHTML='<div class="no-stats">今天还没有专注记录</div>';return;}
    const bySubj={};let totalMin=0;
    entries.forEach(e=>{if(!bySubj[e.subject])bySubj[e.subject]={count:0,minutes:0};bySubj[e.subject].count++;bySubj[e.subject].minutes+=e.duration;totalMin+=e.duration;});
    const maxMin=Math.max(...Object.values(bySubj).map(v=>v.minutes));
    let html='';
    for(const s of SUBJECTS){const d=bySubj[s.id];if(!d)continue;
      html+=`<div class="stat-row"><span class="stat-label">${s.name}</span><div class="stat-bar-bg"><div class="stat-bar" style="width:${(d.minutes/maxMin*100).toFixed(0)}%;background:${s.color}">${d.count}🍅 ${d.minutes}min</div></div></div>`;
    }
    html+=`<div class="stat-total">今日 <strong>${entries.length}</strong> 个番茄 · <strong>${totalMin}</strong> 分钟</div>`;
    document.getElementById('statsBody').innerHTML=html;
  }catch(e){}
}

render();
restoreState();
loadStats();
</script>
</body>
</html>
