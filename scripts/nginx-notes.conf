server {
    listen 80;
    server_name kb.xpy.me;
    root /root/quartz/public;
    index index.html;
    charset utf-8;

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    location /apps/ {
        try_files $uri $uri/ =404;
    }



    # CalDAV for Vikunja (iOS Calendar/Reminders sync)
    location ^~ /caldav/ {
        proxy_pass http://127.0.0.1:8086/dav/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # 所有 /api/ 请求代理到后端
    location /api/ {
        proxy_pass http://127.0.0.1:3457;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        add_header X-Accel-Buffering no;
    }

    # Sync API (不同端口)
    location = /api/sync {
        proxy_pass http://127.0.0.1:3456;
        proxy_read_timeout 120s;
    }

    # Remotely Save uses /dav/myself/ as base dir (vault name)
    location ^~ /dav/myself/ {
        alias /root/webdav-vault/;
        auth_basic "Obsidian Sync";
        auth_basic_user_file /etc/nginx/.htpasswd-webdav;
        client_max_body_size 100M;
        dav_methods PUT DELETE MKCOL COPY MOVE;
        dav_ext_methods PROPFIND OPTIONS;
        dav_access user:rw group:rw all:r;
        create_full_put_path on;
        autoindex on;
    }

    location ^~ /dav/ {
        alias /root/webdav-vault/;
        auth_basic "Obsidian Sync";
        auth_basic_user_file /etc/nginx/.htpasswd-webdav;
        client_max_body_size 100M;
        dav_methods PUT DELETE MKCOL COPY MOVE;
        dav_ext_methods PROPFIND OPTIONS;
        dav_access user:rw group:rw all:r;
        create_full_put_path on;
        autoindex on;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp)$ {
        expires 7d;
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
    gzip_min_length 1000;
}

server {
    listen 80 default_server;
    server_name _;
    return 444;
}
