<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>公式速查表</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js">init();</script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js">init();</script>
<style>
:root{--bg:#f5f7fa;--card:#fff;--text:#1a1a2e;--text2:#555;--accent:#4361ee;--accent2:#3a0ca3;--border:#e0e0e0;--hover:#f0f4ff;--fav:#f59e0b;--shadow:0 2px 8px rgba(0,0,0,.08);--sidebar-w:220px;--topbar:56px}
[data-theme=dark]{--bg:#0f0f1a;--card:#1a1a2e;--text:#e0e0e0;--text2:#aaa;--accent:#7c8cf8;--accent2:#b8c0ff;--border:#2a2a3e;--hover:#252540;--shadow:0 2px 8px rgba(0,0,0,.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s}
/* Password overlay */
#pw-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#4361ee,#3a0ca3);z-index:9999;display:flex;align-items:center;justify-content:center}
#pw-box{background:#fff;border-radius:16px;padding:40px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:380px;width:90%}
#pw-box h2{margin-bottom:8px;color:#1a1a2e}
#pw-box p{color:#666;margin-bottom:20px;font-size:14px}
#pw-box input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:16px;outline:none;transition:border .2s}
#pw-box input:focus{border-color:#4361ee}
#pw-box button{margin-top:16px;width:100%;padding:12px;background:#4361ee;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;transition:background .2s}
#pw-box button:hover{background:#3a0ca3}
#pw-err{color:#e53e3e;font-size:13px;margin-top:8px;display:none}
/* Top bar */
#topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar);background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;box-shadow:var(--shadow)}
#topbar h1{font-size:18px;white-space:nowrap;color:var(--accent2)}
#search-box{flex:1;max-width:420px;padding:8px 14px;border:2px solid var(--border);border-radius:8px;font-size:15px;background:var(--bg);color:var(--text);outline:none;transition:border .2s}
#search-box:focus{border-color:var(--accent)}
.top-btns{display:flex;gap:8px;align-items:center}
.top-btns button{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;cursor:pointer;font-size:13px;color:var(--text);transition:all .2s}
.top-btns button:hover,.top-btns button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
#theme-btn{font-size:18px;background:none;border:none;cursor:pointer;padding:4px 8px}
#sidebar-toggle{display:none;font-size:20px;background:none;border:none;cursor:pointer;color:var(--text)}
/* Sidebar */
#sidebar{position:fixed;top:var(--topbar);left:0;width:var(--sidebar-w);height:calc(100vh - var(--topbar));background:var(--card);border-right:1px solid var(--border);overflow-y:auto;padding:12px 0;z-index:90;transition:transform .3s}
#sidebar a{display:block;padding:6px 16px;font-size:13px;color:var(--text2);text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .15s}
#sidebar a:hover,#sidebar a.active{background:var(--hover);color:var(--accent)}
#sidebar .toc-subject{font-weight:700;color:var(--accent2);padding:10px 16px 4px;font-size:13px;text-transform:uppercase}
/* Main */
#main{margin-left:var(--sidebar-w);margin-top:var(--topbar);padding:20px 24px 60px}
/* Tabs */
#tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:20px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:14px;transition:all .2s;color:var(--text)}
.tab:hover,.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* Sections */
.subject-section{margin-bottom:32px}
.subject-title{font-size:22px;font-weight:700;color:var(--accent2);margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid var(--accent)}
.chapter{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden}
.chapter-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;transition:background .15s}
.chapter-header:hover{background:var(--hover)}
.chapter-header h3{font-size:16px;color:var(--text)}
.chapter-header .arrow{transition:transform .2s;font-size:14px;color:var(--text2)}
.chapter-header .arrow.open{transform:rotate(90deg)}
.chapter-body{padding:0 16px 16px;display:none}
.chapter-body.open{display:block}
.formula-item{padding:10px 0;border-bottom:1px solid var(--border);position:relative}
.formula-item:last-child{border-bottom:none}
.formula-name{font-weight:600;font-size:14px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.formula-content{font-size:15px;line-height:1.8;overflow-x:auto}
.formula-content .katex-display{margin:.4em 0}
.formula-note{font-size:13px;color:var(--text2);margin-top:4px}
.fav-btn{background:none;border:none;cursor:pointer;font-size:16px;color:var(--border);transition:color .2s;flex-shrink:0}
.fav-btn.fav{color:var(--fav)}
table{width:100%;border-collapse:collapse;margin:8px 0;font-size:14px}
th,td{border:1px solid var(--border);padding:6px 10px;text-align:left}
th{background:var(--hover);font-weight:600}
.highlight{background:#fef08a;border-radius:2px}
[data-theme=dark] .highlight{background:#854d0e;color:#fef08a}
.hidden{display:none!important}
.no-results{text-align:center;padding:40px;color:var(--text2);font-size:16px}
/* Mobile */
@media(max-width:768px){
#sidebar{transform:translateX(-100%)}
#sidebar.show{transform:translateX(0)}
#main{margin-left:0}
#sidebar-toggle{display:block}
#topbar h1{display:none}
:root{--sidebar-w:260px}
}
/* Print */
@media print{
#topbar,#sidebar,#tabs,.top-btns,.fav-btn,#sidebar-toggle,#theme-btn{display:none!important}
#main{margin:0;padding:10px}
.chapter-body{display:block!important}
.chapter{break-inside:avoid;box-shadow:none;border:1px solid #ccc}
body{background:#fff;color:#000;font-size:12px}
.subject-title{font-size:18px}
}
</style>
</head>
<body>
<div id="pw-overlay" style="display:none">
<div id="pw-box">
<h2>公式速查表</h2>
<p>请输入访问密码</p>
<input type="password" id="pw-input" placeholder="密码" autofocus>
<button onclick="checkPw()">进入</button>
<div id="pw-err">密码错误，请重试</div>
</div>
</div>
<div id="app">
<div id="topbar">
<button id="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('show')">☰</button>
<h1>📐 公式速查表</h1>
<input type="text" id="search-box" placeholder="搜索公式名称、关键词...">
<div class="top-btns">
<button id="fav-filter" onclick="toggleFavFilter()">⭐ 收藏</button>
<button id="theme-btn" onclick="toggleTheme()">🌙</button>
</div>
</div>
<div id="sidebar"></div>
<div id="main">
<div id="tabs"></div>
<div id="content"></div>
</div>
</div>

if(document.getElementById('pw-overlay'))document.getElementById('pw-overlay').style.display='none';if(typeof init==='function')init();
document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw();});

let favs=JSON.parse(localStorage.getItem('fml-favs')||'{}');
let showFavOnly=false;
let activeSubject='all';
let searchTerm='';

function init(){
  const th=localStorage.getItem('fml-theme');
  if(th==='dark')document.documentElement.setAttribute('data-theme','dark');
  renderTabs();renderContent();renderSidebar();
  document.getElementById('search-box').addEventListener('input',e=>{searchTerm=e.target.value.toLowerCase();renderContent();});
}

function toggleTheme(){
  const d=document.documentElement;
  const isDark=d.getAttribute('data-theme')==='dark';
  d.setAttribute('data-theme',isDark?'':'dark');
  localStorage.setItem('fml-theme',isDark?'':'dark');
  document.getElementById('theme-btn').textContent=isDark?'🌙':'☀️';
}

function toggleFavFilter(){
  showFavOnly=!showFavOnly;
  document.getElementById('fav-filter').classList.toggle('active',showFavOnly);
  renderContent();
}

function renderTabs(){
  const c=document.getElementById('tabs');
  let h='<div class="tab'+(activeSubject==='all'?' active':'')+'" onclick="setSubject(\'all\')">全部</div>';
  DATA.forEach(s=>{h+='<div class="tab'+(activeSubject===s.subject?' active':'')+'" style="--accent:'+s.color+'" onclick="setSubject(\''+s.subject+'\')">'+s.subject+'</div>';});
  c.innerHTML=h;
}

function setSubject(s){activeSubject=s;renderTabs();renderContent();}

function fmtKey(subj,sec,fname){return subj+'|'+sec+'|'+fname;}

function toggleFav(key,btn){
  if(favs[key])delete favs[key];else favs[key]=1;
  localStorage.setItem('fml-favs',JSON.stringify(favs));
  btn.classList.toggle('fav');
}

function renderContent(){
  const c=document.getElementById('content');
  let html='';let total=0;let shown=0;
  DATA.forEach(subj=>{
    if(activeSubject!=='all'&&activeSubject!==subj.subject)return;
    let secHtml='';let subjectHasMatch=false;
    subj.sections.forEach(sec=>{
      let items='';let secHasMatch=false;
      sec.formulas.forEach(f=>{
        total++;
        const key=fmtKey(subj.subject,sec.title,f.name);
        if(showFavOnly&&!favs[key])return;
        if(searchTerm&&!f.name.toLowerCase().includes(searchTerm)&&!f.latex.toLowerCase().includes(searchTerm)&&!sec.title.toLowerCase().includes(searchTerm))return;
        secHasMatch=true;shown++;
        const isFav=favs[key]?'fav':'';
        let nameHtml=searchTerm?f.name.replace(new RegExp('('+searchTerm.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class="highlight">$1</span>'):f.name;
        items+=`<div class="formula-item"><div class="formula-name"><button class="fav-btn ${isFav}" onclick="toggleFav('${key}',this)">★</button>${nameHtml}</div><div class="formula-content">$$${f.latex}$$</div></div>`;
      });
      if(secHasMatch){
        subjectHasMatch=true;
        secHtml+=`<div class="chapter"><div class="chapter-header" onclick="this.querySelector('.arrow').classList.toggle('open');this.nextElementSibling.classList.toggle('open')"><h3>${sec.title}</h3><span class="arrow open">▶</span></div><div class="chapter-body open">${items}</div></div>`;
      }
    });
    if(subjectHasMatch){
      html+=`<div class="subject-section" id="subj-${subj.subject}"><div class="subject-title" style="border-color:${subj.color};color:${subj.color}">${subj.subject}</div>${secHtml}</div>`;
    }
  });
  if(!html)html='<div class="no-results">未找到匹配的公式</div>';
  c.innerHTML=html;
  renderMathInElement(c,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false});
}

function renderSidebar(){
  const sb=document.getElementById('sidebar');
  let h='';
  DATA.forEach(s=>{
    h+='<div class="toc-subject">'+s.subject+'</div>';
    s.sections.forEach(sec=>{h+='<a href="#subj-'+s.subject+'" onclick="setSubject(\''+s.subject+'\')">'+sec.title+'</a>';});
  });
  sb.innerHTML=h;
}
init();</script>
