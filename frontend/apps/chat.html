<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FXY 知识库助手</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root{--bg:#0a0a14;--chat-bg:#0f0f1a;--card:#1a1a2e;--user-bg:#4361ee;--ai-bg:#1e1e38;--text:#e0e0e0;--text2:#999;--border:#2a2a3e;--accent:#4361ee;--accent2:#7c8cf8;--success:#2a9d8f;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}

/* Header */
#header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#header h1{font-size:18px;background:linear-gradient(135deg,#4361ee,#f72585);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
#model-select{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;outline:none;cursor:pointer}
#model-select:focus{border-color:var(--accent)}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.toggle-label{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px;cursor:pointer}
.toggle-label input{accent-color:var(--accent)}
#note-count{font-size:11px;color:var(--text2);background:var(--bg);padding:3px 8px;border-radius:10px}

/* Chat area */
#chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.msg{max-width:85%;display:flex;gap:10px;animation:fadeIn .3s ease}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.ai{align-self:flex-start}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.msg.user .msg-avatar{background:var(--user-bg)}
.msg.ai .msg-avatar{background:linear-gradient(135deg,#2a9d8f,#264653)}
.msg-body{padding:12px 16px;border-radius:var(--radius);line-height:1.7;font-size:14px;word-break:break-word}
.msg.user .msg-body{background:var(--user-bg);color:#fff;border-bottom-right-radius:4px}
.msg.ai .msg-body{background:var(--ai-bg);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-body p{margin:0 0 8px}
.msg-body p:last-child{margin:0}
.msg-body code{background:rgba(255,255,255,.08);padding:1px 5px;border-radius:4px;font-size:13px;font-family:"Fira Code",monospace}
.msg-body pre{background:rgba(0,0,0,.3);padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0}
.msg-body pre code{background:none;padding:0}
.msg-body ul,.msg-body ol{padding-left:20px;margin:8px 0}
.msg-body li{margin:4px 0}
.msg-body h1,.msg-body h2,.msg-body h3,.msg-body h4{margin:12px 0 6px;color:var(--accent2)}
.msg-body table{border-collapse:collapse;margin:8px 0;font-size:13px;width:100%}
.msg-body th,.msg-body td{border:1px solid var(--border);padding:6px 10px}
.msg-body th{background:rgba(67,97,238,.15)}
.msg-body blockquote{border-left:3px solid var(--accent);padding-left:12px;color:var(--text2);margin:8px 0}
.msg-body .katex-display{overflow-x:auto;padding:4px 0}
.msg-body hr{border:none;border-top:1px solid var(--border);margin:12px 0}

/* Context indicator */
.ctx-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(42,157,143,.15);color:var(--success);font-size:11px;padding:3px 8px;border-radius:6px;margin-bottom:8px}

/* Typing indicator */
.typing{display:flex;gap:4px;padding:8px 0}
.typing span{width:6px;height:6px;background:var(--text2);border-radius:50%;animation:bounce .6s infinite alternate}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

/* Input area */
#input-area{background:var(--card);border-top:1px solid var(--border);padding:16px 20px;flex-shrink:0}
#input-wrap{display:flex;gap:10px;max-width:900px;margin:0 auto;align-items:flex-end}
#msg-input{flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;font-size:15px;font-family:inherit;resize:none;outline:none;min-height:48px;max-height:150px;line-height:1.5;transition:border .2s}
#msg-input:focus{border-color:var(--accent)}
#msg-input::placeholder{color:var(--text2)}
#send-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:12px 20px;font-size:15px;cursor:pointer;transition:all .2s;white-space:nowrap;height:48px}
#send-btn:hover{background:#3a56d4}
#send-btn:disabled{opacity:.5;cursor:not-allowed}
.shortcuts{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;max-width:900px;margin-left:auto;margin-right:auto}
.shortcut{background:var(--bg);border:1px solid var(--border);color:var(--text2);border-radius:16px;padding:4px 12px;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
.shortcut:hover{border-color:var(--accent);color:var(--accent)}

/* Welcome */
#welcome{text-align:center;padding:60px 20px;color:var(--text2)}
#welcome h2{font-size:24px;margin-bottom:12px;background:linear-gradient(135deg,#4361ee,#f72585);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#welcome p{font-size:14px;margin-bottom:24px;line-height:1.8}
.welcome-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;max-width:700px;margin:0 auto}
.welcome-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .2s;text-align:left}
.welcome-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.welcome-card .icon{font-size:20px;margin-bottom:6px}
.welcome-card .label{font-size:13px;color:var(--text)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{to{transform:translateY(-6px)}}

@media(max-width:600px){
  .msg{max-width:95%}
  #header h1{font-size:15px}
  .header-right{gap:6px}
  .toggle-label span{display:none}
  #welcome h2{font-size:20px}
  .welcome-cards{grid-template-columns:1fr 1fr}
}
/* mobile-fix */
@media(max-width:600px){
  .chat-container{max-width:100%;padding:0}
  .messages{padding:8px}
  .message{max-width:95%;font-size:13px}
  .input-row{padding:8px}
  .input-row input{font-size:14px}
  .model-select{width:100%;margin-top:4px}
}

</style>
</head>
<body>
<div id="header">
  <h1>🤖 FXY 知识库助手</h1>
  <select id="model-select">
    <option value="deepseek-chat">DeepSeek V3.2</option>
    <option value="deepseek-reasoner">DeepSeek 深度推理</option>
    <option value="glm">GLM-5.1</option>
    <option value="minimax">MiniMax-M2.7</option>
    <option value="qwen">Qwen3.5 多模态</option>
  </select>
  <div class="header-right">
    <label class="toggle-label"><input type="checkbox" id="rag-toggle" checked><span>检索笔记</span>📚</label>
    <span id="note-count"></span>
  </div>
</div>

<div id="chat-area">
  <div id="welcome">
    <h2>你好，FXY 👋</h2>
    <p>我是你的知识库AI助手，可以结合你的笔记回答问题<br>支持 DeepSeek / GLM / MiniMax / Qwen 多个模型</p>
    <div class="welcome-cards">
      <div class="welcome-card" onclick="askQ('帮我复习高数II的重积分，重点讲极坐标和球坐标变换')">
        <div class="icon">📐</div>
        <div class="label">复习高数重积分</div>
      </div>
      <div class="welcome-card" onclick="askQ('有机化学SN1和SN2反应有什么区别？帮我对比总结')">
        <div class="icon">🧪</div>
        <div class="label">有机化学对比</div>
      </div>
      <div class="welcome-card" onclick="askQ('概率统计的三大分布和置信区间怎么用？给我举例说明')">
        <div class="icon">📊</div>
        <div class="label">概统重点讲解</div>
      </div>
      <div class="welcome-card" onclick="askQ('根据我的笔记，帮我列一个本周的复习计划')">
        <div class="icon">📋</div>
        <div class="label">生成复习计划</div>
      </div>
      <div class="welcome-card" onclick="askQ('大学物理热力学第一定律的四个过程分别怎么算？')">
        <div class="icon">🔥</div>
        <div class="label">大物热力学</div>
      </div>
      <div class="welcome-card" onclick="askQ('帮我出5道高数极值与Lagrange乘数法的练习题，附答案')">
        <div class="icon">✏️</div>
        <div class="label">出练习题</div>
      </div>
    </div>
  </div>
</div>

<div id="input-area">
  <div id="input-wrap">
    <textarea id="msg-input" rows="1" placeholder="问任何关于你笔记的问题..." autofocus></textarea>
    <button id="send-btn" onclick="send()">发送</button>
  </div>
  <div class="shortcuts">
    <span class="shortcut" onclick="askQ('总结我的错题本里的高频错误类型')">📝 错题分析</span>
    <span class="shortcut" onclick="askQ('帮我梳理期末考试各科的重点')">🎯 期末重点</span>
    <span class="shortcut" onclick="askQ('解释一下Green公式和Gauss公式的区别与联系')">📐 公式辨析</span>
    <span class="shortcut" onclick="askQ('用我的笔记帮我做一个概率统计的思维导图（文字版）')">🧠 思维导图</span>
  </div>
</div>

<script>
const chatArea = document.getElementById('chat-area');
const input = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
let history = [];
let isStreaming = false;

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 150) + 'px';
});
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// Load note count
fetch('/api/chat-reindex', { method: 'POST' }).then(r => r.json()).then(d => {
  document.getElementById('note-count').textContent = d.count + ' 篇笔记';
}).catch(() => {});

function askQ(q) {
  input.value = q;
  send();
}

function addMsg(role, content, extra) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const avatar = role === 'user' ? '👤' : '🤖';
  let bodyHtml = '';
  if (role === 'ai' && extra?.contexts) {
    bodyHtml += '<div class="ctx-badge">📚 已检索 ' + extra.contexts + ' 篇相关笔记</div>';
  }
  if (content) {
    bodyHtml += renderMd(content);
  }
  div.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="msg-body">${bodyHtml || '<div class="typing"><span></span><span></span><span></span></div>'}</div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

function renderMd(text) {
  try {
    return marked.parse(text, { breaks: true });
  } catch {
    return text.replace(/\n/g, '<br>');
  }
}

function renderMath(el) {
  try {
    renderMathInElement(el, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false },
        { left: '\\[', right: '\\]', display: true },
        { left: '\\(', right: '\\)', display: false }
      ],
      throwOnError: false
    });
  } catch {}
}

async function send() {
  const text = input.value.trim();
  if (!text || isStreaming) return;

  isStreaming = true;
  sendBtn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  addMsg('user', text);
  history.push({ role: 'user', content: text });

  const model = document.getElementById('model-select').value;
  const useRAG = document.getElementById('rag-toggle').checked;

  const aiDiv = addMsg('ai', '', null);
  const bodyEl = aiDiv.querySelector('.msg-body');

  try {
    // Try streaming first, fallback to non-streaming if it fails (e.g. via Cloudflare)
    let useStream = true;
    let resp;
    try {
      resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, model, history: history.slice(-10), useRAG, stream: true })
      });
      if (!resp.ok) throw new Error(resp.status);
      // Check if we actually get SSE
      const ct = resp.headers.get('content-type') || '';
      if (!ct.includes('event-stream') && !ct.includes('octet-stream')) {
        // Might be a non-streaming response or error page, try to parse
        const txt = await resp.text();
        if (txt.includes('<!DOCTYPE') || txt.includes('cloudflare')) {
          useStream = false;
        } else {
          // Try parse as SSE anyway
          useStream = 'text';
          resp._text = txt;
        }
      }
    } catch(e) {
      useStream = false;
    }

    if (!useStream) {
      // Fallback: non-streaming request
      bodyEl.innerHTML = '<div style="color:var(--text2)">⏳ 生成中（非流式模式）...</div>';
      resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, model, history: history.slice(-10), useRAG, stream: false })
      });
      if (!resp.ok) {
        bodyEl.innerHTML = `<span style="color:#e53e3e">错误：${resp.status}</span>`;
        isStreaming = false; sendBtn.disabled = false; return;
      }
      const data = await resp.json();
      const content = data.choices?.[0]?.message?.content || '（无返回）';
      bodyEl.innerHTML = renderMd(content);
      renderMath(bodyEl);
      history.push({ role: 'assistant', content });
      isStreaming = false; sendBtn.disabled = false; input.focus();
      return;
    }

    const reader = (useStream === 'text') ? null : resp.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let buffer = useStream === 'text' ? (resp._text || '') : '';

    if (useStream === 'text') {
      // Process pre-fetched text
      const lines = buffer.split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try { const j = JSON.parse(data); const d = j.choices?.[0]?.delta?.content; if(d) fullText += d; } catch{}
      }
      bodyEl.innerHTML = renderMd(fullText);
      renderMath(bodyEl);
      history.push({ role: 'assistant', content: fullText });
      isStreaming = false; sendBtn.disabled = false; input.focus();
      return;
    }

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content;
          if (delta) {
            fullText += delta;
            bodyEl.innerHTML = renderMd(fullText);
            renderMath(bodyEl);
            chatArea.scrollTop = chatArea.scrollHeight;
          }
        } catch {}
      }
    }

    if (!fullText) {
      bodyEl.innerHTML = '<span style="color:var(--text2)">（模型未返回内容）</span>';
    }

    history.push({ role: 'assistant', content: fullText });

  } catch (e) {
    bodyEl.innerHTML = `<span style="color:#e53e3e">请求失败：${e.message}</span>`;
  }

  isStreaming = false;
  sendBtn.disabled = false;
  input.focus();
}
</script>
</body>
</html>
